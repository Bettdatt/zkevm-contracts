name: Publish

on:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          registry-url: https://registry.npmjs.org/
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile --network-concurrency 1

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1

      - name: Cache Foundry build output
        uses: actions/cache@v4
        with:
          path: |
            foundry-out
            cache
          key: ${{ runner.os }}-foundry-${{ hashFiles('foundry.lock', 'foundry.toml') }}

      - name: Compile contracts (Foundry)
        run: forge build

      - name: Build dist files
        run: yarn build

      - name: Pack NPM package
        run: npm pack

      - name: Publish to NPM
        uses: JS-DevTools/npm-publish@0fd2f4369c5d6bcfcde6091a7c527d810b9b5c3f # v4.1.5
        with:
          token: ${{ secrets.CONTRACTS_NPM_TOKEN }}
          registry: https://registry.npmjs.org/
          package: package.json
          tag: latest
          provenance: true
          strategy: all

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ./*.tgz
